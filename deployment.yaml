apiVersion: apps/v1
kind: Deployment
metadata:
  name: masas-demo-app  # 部署的名称
  labels:
    app: masas-demo-app  # 部署的标签，用于选择器匹配
spec:
  replicas: 3  # 希望运行的 Pod 副本数量
  selector:
    matchLabels:
      app: masas-demo-app  # 选择器，用于管理哪些 Pod 属于此部署
  template:
    metadata:
      labels:
        app: masas-demo-app  # Pod 的标签，必须与上面的选择器匹配
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: masas-demo-app  # 容器名称
          image: chaos-demo-app:latest  # 您刚刚成功导入的镜像
          imagePullPolicy: IfNotPresent  # 镜像拉取策略。如果本地存在则不再拉取
          ports:
            - containerPort: 8080  # 容器内应用程序监听的端口
          env:
            - name: PORT  # 设置环境变量，告诉应用监听哪个端口
              value: "8080"
          # 可选的健康检查（建议添加）
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: masas-demo-app-svc  # 服务的名称
spec:
  selector:
    app: masas-demo-app  # 选择器，匹配上面 Deployment 管理的 Pod
  ports:
    - port: 80  # 服务对集群内暴露的端口
      targetPort: 8080  # 将流量转发到 Pod 的 8080 端口
  type: NodePort  # 默认类型，集群内部访问(ClusterIP)。如果需要从集群外访问，可改为 NodePort 或 LoadBalancer